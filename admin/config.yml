backend:
  name: test-repo

# This part is used for a local development
local_backend: true

media_folder: "assets/img" # The folder where assets like images are stored
public_folder: "/assets/img" # The folder where assets are displayed

collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}